name = "web-to-issues"
main = "src/index.ts"
compatibility_date = "2024-01-29"
workers_dev = true

[assets]
directory = "public"
binding = "ASSETS"

[vars]
ENVIRONMENT = "development"
ALLOWED_ORIGINS = "*"
GITHUB_APP_NAME = "web-to-issues"
MAX_SCREENSHOT_SIZE_MB = "5"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "00000000000000000000000000000000"
preview_id = "00000000000000000000000000000001"
